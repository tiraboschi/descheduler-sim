apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-manager
  namespace: simulation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vm-manager
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete", "patch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["simulation.node-classifier.io"]
  resources: ["virtualmachines"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["simulation.node-classifier.io"]
  resources: ["virtualmachines/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["simulation.node-classifier.io"]
  resources: ["simulationscenarios"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["simulation.node-classifier.io"]
  resources: ["simulationscenarios/status"]
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vm-manager
subjects:
- kind: ServiceAccount
  name: vm-manager
  namespace: simulation
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-controller
  namespace: simulation
  labels:
    app: scenario-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-controller
  template:
    metadata:
      labels:
        app: scenario-controller
    spec:
      serviceAccountName: vm-manager
      containers:
      - name: controller
        image: python:3.11-slim
        command:
          - /bin/sh
          - -c
          - pip install kubernetes --quiet && python3 /app/scenario_controller.py
        volumeMounts:
        - name: code
          mountPath: /app
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: code
        configMap:
          name: scenario-controller-code
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scenario-controller-code
  namespace: simulation
data:
  scenario_controller.py: |
    # This will be populated by setup-kind-env.sh
